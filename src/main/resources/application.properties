spring.application.name=mottu-app

# Datasource: set SPRING_DATASOURCE_* for PostgreSQL (e.g. on Render); otherwise H2 in-memory is used locally
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:mottuapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=${PORT:8080}

# No practical upload limit for memory images
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
jwt.secret=${JWT_SECRET:kjashdujashd3788gde328dh9jqw8dh928hciqeh8qyc9h9c8h723gcbuc923hc9}
jwt.issuer=${JWT_ISSUER:mottu-app}
